<h1>{{title}}</h1> <!--Bindeo de propiedad "title" de la clase del componente a su vista. La doble llave ({{}}) sirve para ejecutar código JavaScript -->
<h3>La base del acumulamiento es {{base}}</h3>

<button (click)="addBase()">+</button> <!-- Evento "click" llama a la función "addOne() de la clase del componente"-->

<span>{{counter}}</span>

<button (click)="subtractBase()">-</button>
